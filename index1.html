<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Amazon Sign In</title>
  <!-- Font Awesome icons ke liye (eye icon wagairah ke liye optional) -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/style1.css"/>
  <!-- Apna CSS file link kar rahe hain -->
  <link rel="stylesheet" href="style1.css"/>
</head>
<body>

  <div class="logo">
    <img src="https://upload.wikimedia.org/wikipedia/commons/a/a9/Amazon_logo.svg" alt="Amazon">
  </div>

  <div class="login-box">
    <h1>Sign in</h1>

    <form>
      <label for="email">Email or mobile phone number</label>
      <input type="email" id="email" placeholder="" required autofocus/>

      <!-- Agar password field abhi chahiye to yeh add kar sakta hai -->
      <!-- 
      <label for="password">Password</label>
      <input type="password" id="password" placeholder="" required/>
      -->

      <button type="submit" class="continue-btn">Continue</button>
    </form>

    <div class="links">
      By continuing, you agree to Amazon's 
      <a href="#">Conditions of Use</a> and 
      <a href="#">Privacy Notice</a>.
    </div>

    <div class="links">
      <i class="fa-solid fa-caret-right"></i> 
      <a href="#">Need help?</a>
    </div>

    <hr style="margin:25px 0; border-color:#e7e7e7;">

    <div class="new-to-amazon">New to Amazon?</div>

    <button class="create-btn">Create your Amazon account</button>
  </div>

  <footer>
    <div class="footer-links">
      <a href="#">Conditions of Use</a> • 
      <a href="#">Privacy Notice</a> • 
      <a href="#">Help</a>
    </div>
    © 1996-2026, Amazon.com, Inc. or its affiliates
  </footer>

</body>
</html>
